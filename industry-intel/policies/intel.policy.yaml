# Graph-bound Cedar policy for the spike graph (cluster.yaml applies_to).
# Two roles: readers invoke stored read queries; analysts can also run the
# stored mutations (invoke_query + change — stored mutations are double-
# gated) and direct data-plane writes.
version: 1
groups:
  readers: ["act-reader", "act-analyst"]
  analysts: ["act-analyst"]
protected_branches: [main]
rules:
  - id: invoke-stored-queries
    allow:
      actors: { group: readers }
      actions: [invoke_query]
  - id: read-data
    allow:
      actors: { group: readers }
      actions: [read, export]
      branch_scope: any
  - id: analyst-writes
    allow:
      actors: { group: analysts }
      actions: [change]
      branch_scope: any
